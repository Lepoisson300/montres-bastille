<!doctype html>
<html lang="fr"> <head>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#C5A059" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Configurez votre montres-bastille | Montre Bastille</title>
    <meta name="description" content="Créez votre montre unique inspirée du patrimoine français. Artisanat et précision à Bordeaux." />

    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>Veuillez activer le JavaScript pour visualiser le configurateur Montre Bastille.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
